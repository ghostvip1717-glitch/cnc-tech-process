# Blueprint: https://render.com/deploy?repo=https://github.com/ghostvip1717-glitch/cnc-tech-process
services:
  - type: web
    name: cnc-tech-process-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_AUTH_ENABLED
        value: "false"
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cnc-tech-process-db
          property: connectionString

databases:
  - name: cnc-tech-process-db
    plan: free
