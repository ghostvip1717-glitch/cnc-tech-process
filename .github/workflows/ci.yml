name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_BASE_PATH: /cnc-tech-process/
          VITE_API_URL: https://example.invalid/exec

  sheets-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sheets-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sheets-backend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build:one-file
