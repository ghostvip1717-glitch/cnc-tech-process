name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "docs/**"
      - "index.html"
      - "assets/**"
      - ".nojekyll"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_PATH: /cnc-tech-process/
          VITE_API_URL: ${{ secrets.VITE_API_URL != '' && secrets.VITE_API_URL || 'https://script.google.com/macros/s/AKfycbxD1AjO9kD26CNbEm_SyJoMjm1UkNYdh3kKleOFbc4WGnkQbLbB8oS_LLQ5AMOg1CzeUA/exec' }}
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Sync static to repo root (legacy Pages branch deploy)
        run: |
          cp frontend/dist/index.html index.html
          cp frontend/dist/404.html 404.html
          rm -rf assets
          cp -r frontend/dist/assets assets
          mkdir -p docs/assets
          cp frontend/dist/index.html docs/index.html
          cp frontend/dist/404.html docs/404.html
          rm -rf docs/assets
          cp -r frontend/dist/assets docs/assets

      - name: Commit synced static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets/ docs/
          git diff --staged --quiet || git commit -m "chore: sync Pages static from CI [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
