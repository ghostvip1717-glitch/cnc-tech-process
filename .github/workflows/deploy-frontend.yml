name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_PATH: /cnc-tech-process/
          VITE_API_URL: ${{ secrets.VITE_API_URL != '' && secrets.VITE_API_URL || 'https://script.google.com/macros/s/AKfycbxD1AjO9kD26CNbEm_SyJoMjm1UkNYdh3kKleOFbc4WGnkQbLbB8oS_LLQ5AMOg1CzeUA/exec' }}
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      # Temporary: repo Pages source is still legacy (main /). Keep root static
      # until Settings → Pages → Source = GitHub Actions, then delete this step.
      - name: Sync static to repo root (legacy Pages branch deploy)
        run: |
          cp frontend/dist/index.html index.html
          cp frontend/dist/404.html 404.html
          touch .nojekyll
          rm -rf assets
          cp -r frontend/dist/assets assets

      - name: Commit synced static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html .nojekyll assets/
          git diff --staged --quiet || git commit -m "chore: sync Pages static from CI [skip ci]"

          # Legacy Pages sync pushes back to main; parallel commits (e.g. State.md)
          # can race the push. Rebase and retry instead of failing the whole deploy.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}/3), rebasing onto origin/main..."
            git fetch origin main
            git pull --rebase origin main
          done
          echo "Failed to push synced static files after 3 attempts"
          exit 1

      - name: Configure Pages
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
