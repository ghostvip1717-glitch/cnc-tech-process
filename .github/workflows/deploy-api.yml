name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend

      - name: Import smoke test
        working-directory: backend
        env:
          TELEGRAM_AUTH_ENABLED: "false"
        run: python -c "from main import app; assert app.title"

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Trigger external API deploy
        env:
          WEBHOOK_URL: ${{ secrets.API_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "API_DEPLOY_WEBHOOK_URL is not set — verify passed, external deploy skipped"
            echo "Host API outside GitHub Pages (Render/Fly/Railway/VPS) and set the webhook secret."
            exit 0
          fi
          curl -fsSL -X POST "$WEBHOOK_URL"
