# Устарело для MVP: прод API = Google Apps Script (sheets-backend/).
# Workflow оставлен только для компиляции архивного FastAPI в backend/.

name: Deploy API (archived FastAPI)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  verify-archived:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile archived backend
        run: python -m compileall backend

      - name: Note
        run: echo "Production API is sheets-backend (Apps Script). FastAPI archive compile-only."
