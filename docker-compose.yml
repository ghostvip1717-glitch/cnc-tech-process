# ARCHIVED: Postgres для старого FastAPI (backend/). Прод = Google Sheets.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cnc
      POSTGRES_PASSWORD: cnc
      POSTGRES_DB: cnc_tech_process
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
